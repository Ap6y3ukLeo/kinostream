<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibix Movie Finder</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; }
        .search-box { background: var(--card); padding: 20px; border-radius: 12px; display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { padding: 12px 24px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #player-container { display: none; background: var(--card); border-radius: 12px; overflow: hidden; width: 100%; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .info { padding: 20px; }
        .error { color: #f87171; background: #450a0a; padding: 15px; border-radius: 8px; display: none; margin-top: 10px; }
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vibix Поиск 🎬</h1>
        <div class="search-box">
            <input type="text" id="kpIdInput" placeholder="Введите Kinopoisk ID (например: 484488)">
            <button onclick="searchMovie()">Найти</button>
        </div>

        <div id="loader" class="loader"></div>
        <div id="error-box" class="error"></div>

        <div id="player-container">
            <div class="video-wrapper" id="videoWrapper"></div>
            <div class="info">
                <h2 id="title"></h2>
                <p id="description"></p>
                <div id="meta" style="font-size: 0.9em; opacity: 0.7;"></div>
            </div>
        </div>
    </div>

    <script>
        // ВНИМАНИЕ: Если API блокирует запросы с браузера, мы используем прокси
        const API_KEY = '23861|hG6BsABzO9l5GUH0Ixwi270wTybAVUJKUQhtSf6Ka33b7d87';
        
        async function searchMovie() {
            const kpId = document.getElementById('kpIdInput').value.trim();
            const loader = document.getElementById('loader');
            const errorBox = document.getElementById('error-box');
            const playerContainer = document.getElementById('player-container');

            if (!kpId) {
                alert("Введите ID!");
                return;
            }

            // Очистка экрана
            errorBox.style.display = 'none';
            playerContainer.style.display = 'none';
            loader.style.display = 'block';

            // Используем прокси AllOrigins для обхода CORS
            const targetUrl = `https://vibix.org/api/v1/publisher/videos/kp/${kpId}`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const proxyData = await response.json();
                
                // AllOrigins возвращает данные в поле contents как строку
                if (!proxyData.contents) {
                    throw new Error("Не удалось получить данные от прокси");
                }

                const result = JSON.parse(proxyData.contents);
                console.log("Результат API:", result);

                if (result && result.iframe_url) {
                    showPlayer(result);
                } else if (result.message) {
                    throw new Error(result.message);
                } else {
                    throw new Error("Видео не найдено в базе Vibix.");
                }

            } catch (err) {
                console.error("Ошибка детально:", err);
                errorBox.textContent = "Ошибка: " + err.message;
                errorBox.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }

        function showPlayer(data) {
            const playerContainer = document.getElementById('player-container');
            const videoWrapper = document.getElementById('videoWrapper');
            
            document.getElementById('title').textContent = data.name_rus || data.name;
            document.getElementById('description').textContent = data.description || "Описание отсутствует.";
            document.getElementById('meta').innerHTML = `
                Год: ${data.year || '-'} | 
                Качество: ${data.quality || '-'} | 
                КП: ${data.kp_rating || '-'}
            `;

            // Вставляем iframe. Важно добавить заголовки авторизации в URL, 
            // но обычно iframe_url от Vibix уже содержит временный токен.
            videoWrapper.innerHTML = `<iframe src="${data.iframe_url}" allowfullscreen></iframe>`;
            
            playerContainer.style.display = 'block';
        }
    </script>
</body>
</html>
